<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title if title else "AI Learning Inbox" }}</title>
    <style>
      :root {
        --bg: #f7f4ec;
        --panel: rgba(255, 251, 245, 0.92);
        --ink: #1f2933;
        --muted: #52606d;
        --accent: #135d66;
        --accent-2: #d97706;
        --line: rgba(19, 93, 102, 0.15);
        --shadow: 0 14px 40px rgba(17, 24, 39, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(217, 119, 6, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(19, 93, 102, 0.12), transparent 34%),
          var(--bg);
      }
      a { color: var(--accent); text-decoration: none; }
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px 80px;
      }
      .hero {
        display: grid;
        gap: 18px;
        margin-bottom: 28px;
      }
      .hero h1 {
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.95;
        margin: 0;
        letter-spacing: -0.04em;
      }
      .hero p { margin: 0; color: var(--muted); font-size: 1.02rem; }
      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 20px;
        backdrop-filter: blur(8px);
      }
      .stack { display: grid; gap: 16px; }
      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .metric {
        padding: 14px;
        border-radius: 16px;
        background: rgba(19, 93, 102, 0.05);
      }
      .metric strong {
        display: block;
        font-size: 1.7rem;
      }
      .label { color: var(--muted); font-size: 0.92rem; }
      form { display: grid; gap: 12px; }
      input, textarea, select, button {
        width: 100%;
        border: 1px solid rgba(31, 41, 51, 0.14);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        background: rgba(255,255,255,0.88);
      }
      button {
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), #0f766e);
        color: white;
        border: none;
        font-weight: 600;
      }
      button.secondary {
        background: linear-gradient(135deg, #d97706, #ea580c);
      }
      .post-list, .theme-list, .action-list { display: grid; gap: 12px; }
      .post-card {
        display: grid;
        gap: 10px;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(31, 41, 51, 0.08);
        background: rgba(255,255,255,0.75);
      }
      .chips { display: flex; gap: 8px; flex-wrap: wrap; }
      .chip {
        font-size: 0.84rem;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(19, 93, 102, 0.08);
        color: var(--accent);
      }
      .muted { color: var(--muted); }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        gap: 12px;
      }
      .topbar nav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .metrics { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <nav>
          <a href="/">Dashboard</a>
          <a href="/posts">All Posts</a>
          <a href="/digests/latest">Latest Digest</a>
          <a href="/health">Health</a>
        </nav>
      </div>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
